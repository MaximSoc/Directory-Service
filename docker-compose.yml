services:
  directoryservice:
    build:
      context: D:/Projects/Directory-Service
      dockerfile: DirectoryService/src/DirectoryService.Presentation/Dockerfile
      args:
        GITHUB_USER: ${GITHUB_USER}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - seq
      - redis
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=directory_service_db;User Id=postgres;Password=postgres
      - ConnectionStrings__Seq=http://seq:5341
    restart: always
  fileservice:
      build:
        context: D:/Projects/Directory-Service
        dockerfile: FileService/FileService/Dockerfile
        args:
          GITHUB_USER: ${GITHUB_USER}
          GITHUB_TOKEN: ${GITHUB_TOKEN}
      ports:
        - "8002:8002"
      depends_on:
        - postgres
        - seq
        - redis
        - minio
      environment:
        - ASPNETCORE_ENVIRONMENT=Docker
        - ASPNETCORE_URLS=http://+:8002
        - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=file_service_db;User Id=postgres;Password=postgres
        - ConnectionStrings__Seq=http://seq:5341
        - S3Options__Endpoint=http://minio:9000
        - S3Options__AccessKey=minioadmin
        - S3Options__SecretKey=minioadmin
      restart: always
  postgres:
    container_name: postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: directory_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  seq:
    image: datalust/seq:latest
    restart: always
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - 5341:5341
      - 8081:80
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis-data:/data
  minio:
    container_name: minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: always

  frontend:
    container_name: frontend-directory-service
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - directoryservice
      - fileservice
      - frontend
    restart: always
volumes:
  postgres-data:
  redis-data: